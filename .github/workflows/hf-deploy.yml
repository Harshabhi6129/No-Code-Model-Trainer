name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Format: your-hf-username/your-space-name  (e.g. harsha/modelforge-backend)
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          git config --global user.email "github-action@modelforge.ai"
          git config --global user.name  "ModelForge CI"

          # Create an orphan branch — single flat commit with NO git history.
          # This avoids the large files that exist in old commits being rejected
          # by HuggingFace Hub's 10 MB per-file limit.
          git checkout --orphan hf-deploy

          # Stage everything from the current working tree
          git add -A

          # Remove the legacy data directory (large static files not needed
          # in the Docker image — they are not referenced by the current code)
          git rm --cached backend/data/ -r --ignore-unmatch
          git rm --cached backend/uploads/ -r --ignore-unmatch
          git rm --cached agents/runs/ -r --ignore-unmatch
          git rm --cached agents/traces/ -r --ignore-unmatch

          git commit -m "deploy: $(date '+%Y-%m-%d %H:%M UTC')"

          git remote add space \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"

          # Force-push the flat commit — HF Space rebuilds Docker on every push
          git push space hf-deploy:main --force
